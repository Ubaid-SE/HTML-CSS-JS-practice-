<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
<h1>Complex Form</h1>
<br>
<fieldset>
    <legend>Personal Information</legend>
    <label for="name">Name</label>
    <input type="text" id="name" name="Info" required>
    <br><br>
    <label for="email">Email</label>
    <input type="email" id="email" name="email" required><br><br>
    <label for="tel">Phone</label>
    <input type="tel" id="tel" name="phonenumber" required><br><br>
    <label for="dob">Date of Birth:</label>
    <input type="date" id="dob" name="date" required><br><br>
    <label for="gender">Gender:</label>
    <input type="radio" id="M" name="Male" required>
    <label for="M">Male</label>
    <input type="radio" id="F" name="Female"required>
    <label for="F">Female</label><br><br>
    <Label for="Country">Country:</Label>
    <select name="Country" id="Country">
        <option value="US">United States</option>
        <option value="en">England</option>
        <option value="Pak">Pakistan</option>
        <option value="Palestine">Palestine</option>
    </select>
</fieldset><br><br>
<fieldset>
    <legend>Address</legend>
    <label for="as">Street</label>
    <input type="text" id="as"><br>
    <br><label for="City">City</label>
    <input type="text" id="City"><br>
    <br><label for="state">State</label><input type="text" id="state">
    <br><br><label for="zc">Zipcode</label>
<input type="text" id="zc">

</fieldset>
<br><br>
<fieldset>
<legend>Other Information</legend>
<label for="info">Comments</label><br>
<textarea name="oi" id="info"></textarea>
<br><br>
<input type="radio" id="terms" name="terms" required >
<label for="terms">I agree to the terms & conditions.</label>


</fieldset>
<input type="submit">

    </form>
</body>
</html>
